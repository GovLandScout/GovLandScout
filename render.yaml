services:
  - type: web
    name: govlandscout
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: "uvicorn web:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.1
      - key: DATABASE_URL
        sync: false
